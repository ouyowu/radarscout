<svg width="200" height="56" viewBox="0 0 200 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange square background -->
  <rect x="0" y="6" width="44" height="44" rx="8" fill="#FF4500"/>
  <!-- Outer radar arc (white, low opacity) -->
  <path d="M 40 28 A 18 18 0 0 1 4 28" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Mid radar arc -->
  <path d="M 34 28 A 12 12 0 0 1 10 28" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <!-- Center dot -->
  <circle cx="22" cy="28" r="3" fill="white"/>
  <!-- Scan line -->
  <line x1="22" y1="28" x2="36" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Signal dot -->
  <circle cx="34" cy="16" r="2" fill="white"/>
  <!-- Wordmark -->
  <text x="56" y="32"
    font-family="-apple-system, 'SF Pro Display', 'Geist', sans-serif"
    font-size="22"
    font-weight="600"
    fill="#ffffff"
    letter-spacing="-0.5">RadarScout</text>
  <!-- Tagline -->
  <text x="57" y="48"
    font-family="-apple-system, 'SF Pro Display', 'Geist', sans-serif"
    font-size="10"
    font-weight="400"
    fill="rgba(255,255,255,0.5)"
    letter-spacing="0.08em">REDDIT INTELLIGENCE</text>
</svg>
